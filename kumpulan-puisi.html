<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500;1,600&family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --paper: #F1E9D8;
    --paper-card: #E9DFC7;
    --paper-card-hover: #E3D7BA;
    --ink: #2B2320;
    --ink-soft: #57493f;
    --wine: #7B2D26;
    --wine-dark: #5f221c;
    --gold: #A9823F;
    --rule: rgba(43, 35, 32, 0.14);
    --shadow: rgba(43, 35, 32, 0.18);
  }

  #puisi-root[data-theme="dark"] {
    --paper: #1B140F;
    --paper-card: #241C15;
    --paper-card-hover: #2D231A;
    --ink: #EDE3D0;
    --ink-soft: #B7A98F;
    --wine: #E0917E;
    --wine-dark: #EFAA99;
    --gold: #D4AF6A;
    --rule: rgba(237, 227, 208, 0.14);
    --shadow: rgba(0, 0, 0, 0.45);
  }
  #puisi-root[data-theme="dark"] .btn-tulis,
  #puisi-root[data-theme="dark"] .btn-simpan { color: #1B140F; }
  #puisi-root[data-theme="dark"] .filter-pill.active { color: #1B140F; }
  #puisi-root { transition: background 0.25s ease, color 0.25s ease; }
  .card, .toc, .sheet, .filter-pill, .tag-pill { transition: background 0.25s ease, border-color 0.25s ease, color 0.25s ease, box-shadow 0.15s ease, transform 0.15s ease; }

  #puisi-root {
    background: var(--paper);
    background-image:
      radial-gradient(ellipse at top left, rgba(123,45,38,0.05), transparent 45%),
      radial-gradient(ellipse at bottom right, rgba(169,130,63,0.06), transparent 50%);
    color: var(--ink);
    font-family: 'Lora', serif;
    min-height: 100vh;
    padding: 48px 24px 80px;
    box-sizing: border-box;
    position: relative;
    overflow-x: hidden;
  }

  #puisi-root * { box-sizing: border-box; }

  .wrap { max-width: 880px; margin: 0 auto; position: relative; z-index: 1; }

  .starfield {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s ease;
    overflow: hidden;
  }
  #puisi-root[data-theme="dark"] .starfield { opacity: 1; }
  .bg-star {
    position: absolute;
    background: #F1E9D8;
    border-radius: 50%;
    animation-name: twinkle;
    animation-iteration-count: infinite;
    animation-timing-function: ease-in-out;
  }
  @media (prefers-reduced-motion: reduce) {
    .bg-star { animation: none; opacity: 0.6; }
  }
  .bg-moon-glow {
    position: fixed;
    top: -130px;
    right: -110px;
    width: 360px;
    height: 360px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(212,175,106,0.20), transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  .bg-shoot {
    position: fixed;
    width: 70px;
    height: 1.5px;
    background: linear-gradient(90deg, rgba(241,233,208,0.95), transparent);
    border-radius: 2px;
    opacity: 0;
    pointer-events: none;
    z-index: 0;
    animation: bgShoot 8s linear infinite;
  }
  @keyframes bgShoot {
    0%, 90% { opacity: 0; transform: translate(0,0) rotate(24deg); }
    91% { opacity: 1; }
    98% { opacity: 0; transform: translate(240px, 100px) rotate(24deg); }
    100% { opacity: 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    .bg-shoot { animation: none; opacity: 0; }
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--wine);
    margin: 0 0 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .eyebrow::before {
    content: '';
    width: 22px;
    height: 1px;
    background: var(--gold);
    display: inline-block;
  }

  header.top {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 20px;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 28px;
    margin-bottom: 36px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 600;
    font-size: clamp(32px, 5vw, 48px);
    margin: 0;
    line-height: 1.1;
    letter-spacing: -0.01em;
  }

  .byline {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.04em;
    color: var(--wine);
    margin: 8px 0 0;
  }
  .byline::before { content: '— '; color: var(--gold); }

  .count-note {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 6px;
  }

  .live-clock {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
    opacity: 0.75;
    margin-top: 4px;
  }

  .btn-icon.active {
    border-color: var(--wine);
    color: var(--wine);
    background: color-mix(in srgb, var(--wine) 10%, transparent);
  }

  .read-viewer-note {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
    opacity: 0.7;
  }

  .btn-tulis {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    letter-spacing: 0.04em;
    background: var(--wine);
    color: var(--paper);
    border: none;
    padding: 13px 20px;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.1s ease;
    white-space: nowrap;
  }
  .btn-tulis:hover { background: var(--wine-dark); transform: translateY(-1px); }
  .btn-tulis:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .btn-icon {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    background: none;
    border: 1px solid var(--rule);
    color: var(--ink-soft);
    padding: 12px 13px;
    border-radius: 3px;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-icon:hover { border-color: var(--gold); color: var(--ink); }
  .btn-theme {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    background: none;
    border: 1px solid var(--rule);
    color: var(--ink-soft);
    padding: 12px 14px;
    border-radius: 3px;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-theme:hover { border-color: var(--gold); color: var(--ink); }

  .hero {
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    margin: 0 0 40px;
    background: linear-gradient(180deg, #0a1330 0%, #14204a 55%, #212f5c 100%);
  }
  .hero-svg { display: block; width: 100%; height: auto; }
  .hero-star { animation: twinkle 3.6s ease-in-out infinite; }
  .hero-star:nth-child(3n) { animation-duration: 4.4s; animation-delay: 0.6s; }
  .hero-star:nth-child(5n) { animation-duration: 5.2s; animation-delay: 1.2s; }
  @keyframes twinkle {
    0%, 100% { opacity: 0.35; }
    50% { opacity: 1; }
  }
  .moon-float {
    animation: moonFloat 6s ease-in-out infinite;
    transform-box: fill-box;
    transform-origin: center;
  }
  @keyframes moonFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }
  .shooting-star {
    opacity: 0;
    animation: shoot 9s ease-in infinite;
    animation-delay: 2s;
  }
  @keyframes shoot {
    0%, 68% { opacity: 0; transform: translate(60px, 6px); }
    70% { opacity: 1; }
    84% { opacity: 0.9; transform: translate(660px, 165px); }
    86%, 100% { opacity: 0; transform: translate(660px, 165px); }
  }
  .hero-quote-wrap {
    position: absolute;
    left: 0; right: 0; top: 30px;
    text-align: center;
    padding: 0 30px;
  }
  .hero-quote-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #B08D57;
    margin: 0 0 12px;
  }
  .hero-quote {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 500;
    font-size: clamp(14px, 2.3vw, 19px);
    color: #F1E9D8;
    max-width: 540px;
    margin: 0 auto;
    line-height: 1.7;
  }
  @media (prefers-reduced-motion: reduce) {
    .hero-star { animation: none; }
  }

  /* Tag pills */
  .tag-pill {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.05em;
    color: var(--wine);
    background: color-mix(in srgb, var(--wine) 10%, transparent);
    border: 1px solid color-mix(in srgb, var(--wine) 30%, transparent);
    padding: 3px 9px;
    border-radius: 10px;
    margin: 0 5px 5px 0;
  }
  .tag-row { margin-bottom: 10px; }

  .mood-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--mood-color, var(--gold));
    margin-bottom: 10px;
  }

  .read-mood {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--mood-color, var(--gold));
    background: color-mix(in srgb, var(--mood-color, var(--gold)) 12%, transparent);
    border: 1px solid color-mix(in srgb, var(--mood-color, var(--gold)) 35%, transparent);
    padding: 4px 11px;
    border-radius: 11px;
    margin-bottom: 20px;
  }

  .btn-music {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--mood-color, var(--gold));
    background: transparent;
    border: 1px solid color-mix(in srgb, var(--mood-color, var(--gold)) 40%, transparent);
    padding: 4px 12px;
    border-radius: 11px;
    margin: 0 0 20px 8px;
    cursor: pointer;
  }
  .btn-music:hover { background: color-mix(in srgb, var(--mood-color, var(--gold)) 14%, transparent); }
  .btn-music.playing { background: var(--mood-color, var(--gold)); color: var(--paper); }
  .btn-music .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: currentColor;
  }
  .btn-music.playing .dot { animation: musicPulse 1.1s ease-in-out infinite; }
  @keyframes musicPulse {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50% { transform: scale(1.6); opacity: 1; }
  }

  .mood-select-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 10px 0 0;
  }
  select.mood-select {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--ink);
    padding: 8px 10px;
    border-radius: 3px;
    cursor: pointer;
  }
  .btn-ai-mood {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    background: none;
    border: 1px dashed var(--gold);
    color: var(--gold);
    padding: 8px 12px;
    border-radius: 3px;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-ai-mood:hover { background: var(--gold); color: var(--paper); }
  .btn-ai-mood:disabled { opacity: 0.6; cursor: wait; }

  /* Featured: Puisi Hari Ini */
  .featured {
    position: relative;
    overflow: hidden;
    border-radius: 6px;
    padding: 26px 28px;
    margin-bottom: 34px;
    border: 1px solid var(--rule);
    background: linear-gradient(155deg, color-mix(in srgb, var(--mood-color, var(--gold)) 13%, var(--paper-card)), var(--paper-card) 70%);
    border-top: 3px solid var(--mood-color, var(--gold));
  }
  .featured-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--mood-color, var(--gold));
    margin: 0 0 12px;
  }
  .featured-title {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 600;
    font-size: 26px;
    margin: 0 0 10px;
    line-height: 1.25;
  }
  .featured-preview {
    font-size: 14.5px;
    color: var(--ink-soft);
    font-style: italic;
    line-height: 1.7;
    white-space: pre-line;
    max-width: 560px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin: 0 0 18px;
  }
  .featured-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    background: none;
    border: 1px solid var(--mood-color, var(--gold));
    color: var(--mood-color, var(--gold));
    padding: 9px 16px;
    border-radius: 3px;
    cursor: pointer;
  }
  .featured-btn:hover { background: var(--mood-color, var(--gold)); color: var(--paper); }

  /* Stats bar */
  .stats-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 22px;
  }
  .stat-chip {
    flex: 1;
    min-width: 140px;
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 12px 16px;
    background: color-mix(in srgb, var(--paper-card) 45%, transparent);
  }
  .stat-value {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 600;
    font-size: 19px;
    line-height: 1.2;
  }
  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: 4px;
  }

  /* Mood donut chart */
  .mood-donut-card {
    display: flex;
    align-items: center;
    gap: 26px;
    flex-wrap: wrap;
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 20px 24px;
    margin-bottom: 22px;
    background: color-mix(in srgb, var(--paper-card) 40%, transparent);
  }
  .donut-svg {
    width: 120px;
    height: 120px;
    flex-shrink: 0;
  }
  .donut-seg {
    transition: stroke-dasharray 0.6s cubic-bezier(0.16, 0.8, 0.3, 1);
    animation: donutGrow 0.9s cubic-bezier(0.16, 0.8, 0.3, 1) both;
  }
  @keyframes donutGrow {
    from { stroke-dasharray: 0 999; }
  }
  .donut-center-num {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 600;
    font-size: 22px;
    fill: var(--ink);
  }
  .donut-center-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 7px;
    letter-spacing: 0.1em;
    fill: var(--ink-soft);
  }
  .donut-legend {
    display: flex;
    flex-direction: column;
    gap: 7px;
    flex: 1;
    min-width: 160px;
  }
  .donut-legend-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink);
  }
  .donut-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .donut-legend-label { flex: 1; }
  .donut-legend-pct { color: var(--ink-soft); }
  @media (prefers-reduced-motion: reduce) {
    .donut-seg { animation: none; }
  }

  /* Search */
  .search-row {
    margin-bottom: 18px;
  }
  input.search-input {
    width: 100%;
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 15px;
    background: var(--paper-card);
    border: 1px solid var(--rule);
    color: var(--ink);
    padding: 12px 16px;
    border-radius: 4px;
  }
  input.search-input:focus { outline: none; border-color: var(--gold); }
  input.search-input::placeholder { color: var(--ink-soft); opacity: 0.7; }

  .toc {
    margin-bottom: 30px;
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 6px 22px;
    background: color-mix(in srgb, var(--paper-card) 55%, transparent);
  }
  .toc-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0;
    cursor: pointer;
    user-select: none;
  }
  .toc-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--wine);
    margin: 0;
  }
  .toc-toggle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
    background: none;
    border: none;
    cursor: pointer;
  }
  .toc-list {
    list-style: none;
    margin: 0;
    padding: 2px 0 16px;
  }
  .toc-item {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 8px 0;
    border-top: 1px dotted var(--rule);
    cursor: pointer;
    background: none;
    border-left: none;
    border-right: none;
    border-bottom: none;
    width: 100%;
    text-align: left;
    font: inherit;
    color: inherit;
  }
  .toc-item:first-child { border-top: none; }
  .toc-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--gold);
    flex-shrink: 0;
    width: 24px;
  }
  .toc-title {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 15px;
    flex: 1;
  }
  .toc-item:hover .toc-title { color: var(--wine); }
  .toc-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    color: var(--ink-soft);
    opacity: 0.7;
    flex-shrink: 0;
  }
  .toc-item:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  .filter-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
  }
  .filter-pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.04em;
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--ink-soft);
    padding: 6px 13px;
    border-radius: 12px;
    cursor: pointer;
  }
  .filter-pill:hover { border-color: var(--gold); color: var(--ink); }
  .filter-pill.active { background: var(--wine); border-color: var(--wine); color: var(--paper); }

  .card-updated {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-soft);
    opacity: 0.65;
    margin-top: 2px;
    text-align: right;
  }

  input.tag-input {
    width: 100%;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    border: none;
    border-bottom: 1px solid var(--rule);
    background: transparent;
    color: var(--ink);
    padding: 6px 0 8px;
  }
  input.tag-input:focus { outline: none; border-bottom-color: var(--wine); }
  input.tag-input::placeholder { color: #a89a86; }

  @keyframes cardFadeIn {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card-anim {
    animation: cardFadeIn 0.5s cubic-bezier(0.16, 0.8, 0.3, 1) both;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 22px;
  }

  .card {
    background: linear-gradient(165deg, color-mix(in srgb, var(--mood-color, var(--gold)) 9%, var(--paper-card)), var(--paper-card) 65%);
    border: 1px solid var(--rule);
    border-radius: 2px;
    border-top: 3px solid var(--mood-color, var(--gold));
    padding: 22px 20px 18px;
    cursor: pointer;
    position: relative;
    box-shadow: 0 1px 0 var(--shadow);
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.25s ease;
    display: flex;
    flex-direction: column;
    min-height: 190px;
  }
  .card:nth-child(3n+1) { transform: rotate(-0.6deg); }
  .card:nth-child(3n+2) { transform: rotate(0.4deg); }
  .card:nth-child(3n+3) { transform: rotate(-0.2deg); }
  .card:hover {
    background: linear-gradient(165deg, color-mix(in srgb, var(--mood-color, var(--gold)) 16%, var(--paper-card-hover)), var(--paper-card-hover));
    box-shadow: 0 8px 22px color-mix(in srgb, var(--mood-color, var(--gold)) 22%, var(--shadow));
    transform: translateY(-3px) rotate(0deg);
  }
  .card:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  .card-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    color: var(--gold);
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    font-size: 19px;
    line-height: 1.3;
    margin: 0 0 10px;
  }

  .card-preview {
    font-style: italic;
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.6;
    white-space: pre-line;
    flex: 1;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
  }

  .card-date {
    font-family: 'JetBrains Mono', monospace;

(function () {
  const memoryStore = { personal: {}, shared: {} };
  let usingFallbackStorage = false;

  function makeMemoryStorage() {
    return {
      async get(key, shared) {
        const store = shared ? memoryStore.shared : memoryStore.personal;
        if (!(key in store)) throw new Error('Kunci tidak ditemukan');
        return { key, value: store[key], shared: !!shared };
      },
      async set(key, value, shared) {
        const store = shared ? memoryStore.shared : memoryStore.personal;
        store[key] = value;
        return { key, value, shared: !!shared };
      },
      async delete(key, shared) {
        const store = shared ? memoryStore.shared : memoryStore.personal;
        delete store[key];
        return { key, deleted: true, shared: !!shared };
      },
      async list(prefix, shared) {
        const store = shared ? memoryStore.shared : memoryStore.personal;
        const keys = Object.keys(store).filter(k => !prefix || k.indexOf(prefix) === 0);
        return { keys, prefix, shared: !!shared };
      }
    };
  }

  function getStorage() {
    if (window.storage && typeof window.storage.set === 'function' && typeof window.storage.get === 'function') {
      return window.storage;
    }
    usingFallbackStorage = true;
    return makeMemoryStorage();
  }

  function guessMood(poem) {
    const haystack = (((poem.tags || []).join(' ')) + ' ' + (poem.title || '') + ' ' + (poem.content || '')).toLowerCase();
    for (const key of Object.keys(MOODS)) {
      if (key === 'netral') continue;
      if (MOODS[key].keywords.some(kw => haystack.includes(kw))) return key;
    }
    return 'netral';
  }

  function resolveMood(poem) {
    const key = (poem.mood && MOODS[poem.mood]) ? poem.mood : guessMood(poem);
    return { key, ...MOODS[key] };
  }

  function pickFeaturedPoem() {
    if (poems.length === 0) return null;
    const todayStr = new Date().toISOString().slice(0, 10);
    const seedStr = todayStr + ':' + poems.length;
    let hash = 0;
    for (let i = 0; i < seedStr.length; i++) {
      hash = ((hash << 5) - hash + seedStr.charCodeAt(i)) | 0;
    }
    const index = Math.abs(hash) % poems.length;
    return poems[index];
  }

  const SOUND_CONFIG = {
    netral:  { freqs: [261.63, 329.63, 392.00], wave: 'sine',     filter: 1800 },
    duka:    { freqs: [196.00, 233.08, 293.66], wave: 'sine',     filter: 650  },
    rindu:   { freqs: [220.00, 261.63, 329.63], wave: 'triangle', filter: 1400, arp: 'slow' },
    suka:    { freqs: [261.63, 329.63, 392.00], wave: 'triangle', filter: 2200, arp: 'fast' },
    harapan: { freqs: [293.66, 369.99, 440.00], wave: 'sine',     filter: 2000, rising: true },
    alam:    { freqs: [220.00, 329.63],         wave: 'sine',     filter: 900,  noise: true }
  };

  let audioCtx = null;
  let currentAmbient = null;

  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function stopAmbient() {
    if (!currentAmbient) return;
    currentAmbient.stop();
    currentAmbient = null;
    document.querySelectorAll('.btn-music.playing').forEach(b => {
      b.classList.remove('playing');
      b.querySelector('.label').textContent = 'Putar Suasana';
    });
  }

  function startAmbient(moodKey) {
    stopAmbient();
    const ctx = getAudioCtx();
    const cfg = SOUND_CONFIG[moodKey] || SOUND_CONFIG.netral;
    const master = ctx.createGain();
    master.gain.value = 0;
    master.connect(ctx.destination);
    master.gain.linearRampToValueAtTime(0.16, ctx.currentTime + 1.6);

    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = cfg.filter;
    filter.connect(master);

    if (cfg.rising) {
      filter.frequency.setValueAtTime(600, ctx.currentTime);
      filter.frequency.linearRampToValueAtTime(cfg.filter, ctx.currentTime + 8);
    }

    const nodes = [];
    cfg.freqs.forEach((f, i) => {
      const osc = ctx.createOscillator();
      osc.type = cfg.wave;
      osc.frequency.value = f;
      const oscGain = ctx.createGain();
      oscGain.gain.value = 0.5 / cfg.freqs.length;
      const lfo = ctx.createOscillator();
      lfo.frequency.value = 0.07 + i * 0.02;
      const lfoGain = ctx.createGain();
      lfoGain.gain.value = 0.12;
      lfo.connect(lfoGain);
      lfoGain.connect(oscGain.gain);
      osc.connect(oscGain);
      oscGain.connect(filter);
      osc.start();
      lfo.start();
      nodes.push(osc, lfo);
    });

    let noiseSrc = null;
    if (cfg.noise) {
      const bufferSize = 2 * ctx.sampleRate;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
      noiseSrc = ctx.createBufferSource();
      noiseSrc.buffer = buffer;
      noiseSrc.loop = true;
      const noiseFilter = ctx.createBiquadFilter();
      noiseFilter.type = 'lowpass';
      noiseFilter.frequency.value = 450;
      const noiseLfo = ctx.createOscillator();
      noiseLfo.frequency.value = 0.13;
      const noiseLfoGain = ctx.createGain();
      noiseLfoGain.gain.value = 220;
      noiseLfo.connect(noiseLfoGain);
      noiseLfoGain.connect(noiseFilter.frequency);
      const noiseGain = ctx.createGain();
      noiseGain.gain.value = 0.5;
      noiseSrc.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(master);
      noiseSrc.start();
      noiseLfo.start();
      nodes.push(noiseLfo);
    }

    let arpTimer = null;
    if (cfg.arp) {
      const notes = cfg.freqs.concat(cfg.freqs.map(f => f * 2));
      let idx = 0;
      const gap = cfg.arp === 'fast' ? 520 : 1500;
      const dur = cfg.arp === 'fast' ? 0.6 : 1.3;
      const pluck = () => {
        const f = notes[idx % notes.length];
        idx++;
        const t = ctx.currentTime;
        const o = ctx.createOscillator();
        o.type = 'triangle';
        o.frequency.value = f;
        const g = ctx.createGain();
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.11, t + 0.04);
        g.gain.exponentialRampToValueAtTime(0.001, t + dur);
        o.connect(g);
        g.connect(filter);
        o.start(t);
        o.stop(t + dur + 0.05);
        arpTimer = setTimeout(pluck, gap + Math.random() * 250);
      };
      arpTimer = setTimeout(pluck, 300);
    }

    currentAmbient = {
      stop() {
        const t = ctx.currentTime;
        master.gain.cancelScheduledValues(t);
        master.gain.setValueAtTime(master.gain.value, t);
        master.gain.linearRampToValueAtTime(0, t + 0.5);
        if (arpTimer) clearTimeout(arpTimer);
        setTimeout(() => {
          nodes.forEach(n => { try { n.stop(); } catch (e) {} });
          if (noiseSrc) { try { noiseSrc.stop(); } catch (e) {} }
          try { master.disconnect(); filter.disconnect(); } catch (e) {}
        }, 600);
      }
    };
  }

  async function hashPassphrase(text) {
    const encoder = new TextEncoder();
    const data = encoder.encode(text);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  function computeStats() {
    const total = poems.length;
    const moodCounts = {};
    poems.forEach(p => { const m = resolveMood(p).key; moodCounts[m] = (moodCounts[m] || 0) + 1; });
    let topMood = null, topMoodCount = 0;
    Object.keys(moodCounts).forEach(k => { if (moodCounts[k] > topMoodCount) { topMood = k; topMoodCount = moodCounts[k]; } });
    const monthCounts = {};
    poems.forEach(p => {
      const d = new Date(p.date);
      if (isNaN(d)) return;
      const key = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
      monthCounts[key] = (monthCounts[key] || 0) + 1;
    });
    let topMonth = null, topMonthCount = 0;
    Object.keys(monthCounts).forEach(k => { if (monthCounts[k] > topMonthCount) { topMonth = k; topMonthCount = monthCounts[k]; } });
    let topMonthLabel = '—';
    if (topMonth) {
      const [y, m] = topMonth.split('-');
      const d = new Date(parseInt(y, 10), parseInt(m, 10) - 1, 1);
      topMonthLabel = d.toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
    }
    return { total, topMood: topMood ? MOODS[topMood] : null, topMonthLabel, moodCounts };
  }

  function buildMoodDonut(moodCounts, total) {
    const r = 46;
    const circumference = 2 * Math.PI * r;
    let cum = 0;
    let circles = '';
    let legend = '';
    Object.keys(MOODS).forEach(key => {
      const count = moodCounts[key] || 0;
      if (count === 0) return;
      const frac = count / total;
      const len = frac * circumference;
      circles += '<circle cx="60" cy="60" r="' + r + '" fill="none" stroke="' + MOODS[key].color +
        '" stroke-width="15" stroke-dasharray="' + len.toFixed(2) + ' ' + (circumference - len).toFixed(2) +
        '" stroke-dashoffset="' + (-cum).toFixed(2) + '" transform="rotate(-90 60 60)" class="donut-seg" />';
      cum += len;
      const pct = Math.round(frac * 100);
      legend += '<div class="donut-legend-row"><span class="donut-dot" style="background:' + MOODS[key].color + '"></span>' +
        '<span class="donut-legend-label">' + MOODS[key].emoji + ' ' + escapeHtml(MOODS[key].label) + '</span>' +
        '<span class="donut-legend-pct">' + pct + '%</span></div>';
    });
    return (
      '<div class="mood-donut-card">' +
        '<svg viewBox="0 0 120 120" class="donut-svg">' +
          '<circle cx="60" cy="60" r="' + r + '" fill="none" stroke="var(--rule)" stroke-width="15" />' +
          circles +
          '<text x="60" y="56" text-anchor="middle" class="donut-center-num">' + total + '</text>' +
          '<text x="60" y="72" text-anchor="middle" class="donut-center-label">PUISI</text>' +
        '</svg>' +
        '<div class="donut-legend">' + legend + '</div>' +
      '</div>'
    );
  }

      const mood = resolveMood(p);
      card.style.setProperty('--mood-color', mood.color);
      const num = String(idx + 1).padStart(2, '0');
      const tagsHtml = (p.tags || []).length
        ? '<div class="tag-row">' + p.tags.map(t => '<span class="tag-pill">' + escapeHtml(t) + '</span>').join('') + '</div>'
        : '';
      card.innerHTML =
        '<div class="card-num">No. ' + num + '</div>' +
        '<div class="mood-pill">' + mood.emoji + ' ' + escapeHtml(mood.label) + '</div>' +
        '<h3 class="card-title">' + escapeHtml(p.title || 'Tanpa Judul') + '</h3>' +
        tagsHtml +
        '<div class="card-preview">' + escapeHtml(p.content || '') + '</div>' +
        '<div class="card-date">Ditulis ' + escapeHtml(formatDate(p.date)) + '</div>' +
        '<div class="card-updated">Diperbarui ' + escapeHtml(formatDate(p.updatedAt || p.date)) + '</div>';
      card.addEventListener('click', () => openReader(p));
      card.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openReader(p); }
      });
      cardAnim.appendChild(card);
      grid.appendChild(cardAnim);
    });

    contentSlot.appendChild(grid);
  }

  function closeOverlay() {
    if (!overlayEl) return;
    stopAmbient();
    currentReaderIndex = null;
    const el = overlayEl;
    overlayEl = null;
    el.classList.add('closing');
    setTimeout(() => { el.remove(); }, 170);
    document.removeEventListener('keydown', escListener);
  }

  function escListener(e) {
    if (e.key === 'Escape') { closeOverlay(); return; }
    if (currentReaderIndex === null) return;
    const tag = (document.activeElement && document.activeElement.tagName) || '';
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
    if (e.key === 'ArrowLeft') navigateReader(-1);
    if (e.key === 'ArrowRight') navigateReader(1);
  }

  function applySheetMood(sheet, colorHex) {
    sheet.style.backgroundColor = 'var(--paper)';
    sheet.style.backgroundImage =
      'radial-gradient(ellipse 150% 60% at 50% -20%, color-mix(in srgb, ' + colorHex + ' 24%, transparent) 0%, transparent 68%),' +
      'repeating-linear-gradient(to bottom, transparent, transparent 30px, var(--rule) 31px)';
  }

  function openOverlayShell(innerHtml) {
    closeOverlay();
    overlayEl = document.createElement('div');
    overlayEl.className = 'overlay';
    overlayEl.innerHTML = '<div class="sheet">' +
      '<button class="sheet-close" aria-label="Tutup">✕ Tutup</button>' +
      innerHtml +
      '</div>';
    overlayEl.addEventListener('click', (e) => {
      if (e.target === overlayEl) closeOverlay();
    });
    overlayEl.querySelector('.sheet-close').addEventListener('click', closeOverlay);
    root.appendChild(overlayEl);
    document.addEventListener('keydown', escListener);
    return overlayEl.querySelector('.sheet');
  }

  function openReader(poem) {
    const mood = resolveMood(poem);
    const idx = poems.findIndex(p => p.id === poem.id);
    currentReaderIndex = idx;
    const tagsHtml = (poem.tags || []).length
      ? '<div class="tag-row">' + poem.tags.map(t => '<span class="tag-pill">' + escapeHtml(t) + '</span>').join('') + '</div>'
      : '';
    const updatedLine = (poem.updatedAt && poem.updatedAt !== poem.date)
      ? ' &middot; Diperbarui ' + escapeHtml(formatDate(poem.updatedAt))
      : '';
    const atStart = idx <= 0;
    const atEnd = idx >= poems.length - 1;
    const sheet = openOverlayShell(
      '<div class="mood-particles" id="mood-particles"></div>' +
      '<div class="read-nav">' +
        '<button class="nav-arrow" id="btn-prev-poem" ' + (atStart ? 'disabled' : '') + ' aria-label="Puisi sebelumnya">&larr;</button>' +
        '<span class="nav-position">' + (idx + 1) + ' / ' + poems.length + '</span>' +
        '<button class="nav-arrow" id="btn-next-poem" ' + (atEnd ? 'disabled' : '') + ' aria-label="Puisi berikutnya">&rarr;</button>' +
      '</div>' +
      '<div class="read-num">No. ' + escapeHtml(String(idx + 1).padStart(2,'0')) + '</div>' +
      '<h2 class="read-title">' + escapeHtml(poem.title || 'Tanpa Judul') + '</h2>' +
      '<div class="read-date">Ditulis ' + escapeHtml(formatDate(poem.date)) + updatedLine + '</div>' +
      '<div class="read-controls">' +
        '<div class="read-mood" style="--mood-color:' + mood.color + '">' + mood.emoji + ' ' + escapeHtml(mood.label) + '</div>' +
        '<button class="btn-music" id="btn-music" style="--mood-color:' + mood.color + '"><span class="dot"></span><span class="label">Putar Suasana</span></button>' +
        '<div class="fs-group">' +
          '<span class="fs-label">Aa</span>' +
          '<button class="fs-btn" id="fs-minus" aria-label="Perkecil huruf">−</button>' +
          '<button class="fs-btn" id="fs-plus" aria-label="Perbesar huruf">+</button>' +
        '</div>' +
      '</div>' +
      tagsHtml +
      '<div class="read-body">' + escapeHtml(poem.content || '') + '</div>' +
      '<div class="read-actions">' +
        (editMode
          ? '<button class="btn-edit" id="btn-do-edit">Sunting</button><button class="btn-hapus" id="btn-do-hapus">Hapus</button>'
          : '<span class="read-viewer-note">🕊️ Dibagikan oleh why_u untuk dibaca</span>') +
      '</div>'
    );
    const editBtn = sheet.querySelector('#btn-do-edit');
    const hapusBtn = sheet.querySelector('#btn-do-hapus');
    if (editBtn) editBtn.addEventListener('click', () => openForm(poem));
    if (hapusBtn) hapusBtn.addEventListener('click', () => confirmDelete(poem));
    applySheetMood(sheet, mood.color);
    applyFontScale(sheet);
    renderMoodParticles(sheet.querySelector('#mood-particles'), mood.key, mood.color);

    const prevBtn = sheet.querySelector('#btn-prev-poem');
    const nextBtn = sheet.querySelector('#btn-next-poem');
    prevBtn.addEventListener('click', () => navigateReader(-1));
    nextBtn.addEventListener('click', () => navigateReader(1));

    sheet.querySelector('#fs-minus').addEventListener('click', () => {
      readFontScale = Math.max(0.8, +(readFontScale - 0.1).toFixed(2));
      applyFontScale(sheet);
    });
    sheet.querySelector('#fs-plus').addEventListener('click', () => {
      readFontScale = Math.min(1.6, +(readFontScale + 0.1).toFixed(2));
      applyFontScale(sheet);
    });

    const musicBtn = sheet.querySelector('#btn-music');
    musicBtn.addEventListener('click', () => {
      if (currentAmbient) {
        stopAmbient();
      } else {
        try {
          startAmbient(mood.key);
          musicBtn.classList.add('playing');
          musicBtn.querySelector('.label').textContent = 'Hentikan Musik';
        } catch (e) {
          showError('Browser ini tidak mendukung audio ambient.');
        }
      }
    });
  }

  function navigateReader(delta) {
    if (currentReaderIndex === null) return;
    const newIndex = currentReaderIndex + delta;
    if (newIndex < 0 || newIndex >= poems.length) return;
    openReader(poems[newIndex]);
  }

  function confirmDelete(poem) {
    const sheet = overlayEl.querySelector('.sheet');
    const actions = sheet.querySelector('.read-actions');
    actions.innerHTML =
      '<span style="font-family:\'JetBrains Mono\',monospace;font-size:12px;color:var(--ink-soft);align-self:center;">Hapus puisi ini secara permanen?</span>' +
      '<button class="btn-hapus" id="btn-confirm-hapus" style="border-color:var(--wine);color:var(--wine);">Ya, Hapus</button>' +
      '<button class="btn-edit" id="btn-cancel-hapus">Batal</button>';
    sheet.querySelector('#btn-confirm-hapus').addEventListener('click', () => doDelete(poem));
    sheet.querySelector('#btn-cancel-hapus').addEventListener('click', () => openReader(poem));
  }

  async function doDelete(poem) {
    try {
      await fsDeletePoem(poem.id);
      closeOverlay();
      await loadPoems();
    } catch (e) {
      console.error('Gagal menghapus puisi:', e);
      showError('Gagal menghapus puisi: ' + (e && e.message ? e.message : 'periksa aturan Firestore.'));
    }
  }

  function openForm(existing) {
    currentReaderIndex = null;
    const isEdit = !!existing;
    const draftKey = 'draft:' + (existing ? existing.id : 'new');
    const initialMoodKey = existing ? (existing.mood || guessMood(existing)) : 'netral';
    const moodOptionsHtml = Object.keys(MOODS).map(key =>
      '<option value="' + key + '"' + (key === initialMoodKey ? ' selected' : '') + '>' +
      MOODS[key].emoji + ' ' + MOODS[key].label + '</option>'
    ).join('');
    const sheet = openOverlayShell(
      '<div id="draft-banner-slot"></div>' +
      '<span class="field-label">Judul</span>' +
      '<input type="text" class="title-input" id="input-title" placeholder="Judul puisi..." value="' + (existing ? escapeHtml(existing.title) : '') + '" />' +
      '<span class="field-label">Isi Puisi</span>' +
      '<textarea class="body-input" id="input-body" placeholder="Tulis puisimu di sini...">' + (existing ? escapeHtml(existing.content) : '') + '</textarea>' +
      '<span class="field-label">Tag (pisahkan dengan koma)</span>' +
      '<input type="text" class="tag-input" id="input-tags" placeholder="suka, duka, rindu..." value="' + (existing && existing.tags ? escapeHtml(existing.tags.join(', ')) : '') + '" />' +
      '<span class="field-label">Suasana Latar</span>' +
      '<div class="mood-select-row">' +
        '<select class="mood-select" id="input-mood">' + moodOptionsHtml + '</select>' +
        '<button type="button" class="btn-ai-mood" id="btn-ai-mood">✨ Biar AI Pilih</button>' +
      '</div>' +
      '<div class="sheet-actions">' +
        '<span style="font-family:\'JetBrains Mono\',monospace;font-size:11px;color:var(--ink-soft);">' + (isEdit ? 'Menyunting puisi' : 'Puisi baru') + '</span>' +
        '<button class="btn-simpan" id="btn-simpan">Simpan Puisi</button>' +
      '</div>'
    );

    const titleInput = sheet.querySelector('#input-title');
    const bodyInput = sheet.querySelector('#input-body');
    const tagsInput = sheet.querySelector('#input-tags');
    const moodSelect = sheet.querySelector('#input-mood');
    const aiMoodBtn = sheet.querySelector('#btn-ai-mood');
    const saveBtn = sheet.querySelector('#btn-simpan');
    titleInput.focus();
    applySheetMood(sheet, MOODS[initialMoodKey].color);

    let moodTouchedByUser = false;

    function showDraftBanner(draft) {
      const slot = sheet.querySelector('#draft-banner-slot');
      if (!slot) return;
      const savedTime = draft.savedAt
        ? new Date(draft.savedAt).toLocaleString('id-ID', { hour: '2-digit', minute: '2-digit', day: 'numeric', month: 'short' })
        : '';
      slot.innerHTML =
        '<div class="draft-banner">' +
          '<span>📝 Ada draf tersimpan otomatis' + (savedTime ? ' (' + escapeHtml(savedTime) + ')' : '') + '</span>' +
          '<div class="draft-banner-actions">' +
            '<button class="draft-btn" id="btn-use-draft">Gunakan Draf</button>' +
            '<button class="draft-btn subtle" id="btn-discard-draft">Abaikan</button>' +
          '</div>' +
        '</div>';
      slot.querySelector('#btn-use-draft').addEventListener('click', () => {
        titleInput.value = draft.title || '';
        bodyInput.value = draft.content || '';
        tagsInput.value = (draft.tags || []).join(', ');
        if (draft.mood && MOODS[draft.mood]) {
          moodSelect.value = draft.mood;
          moodTouchedByUser = true;
          applySheetMood(sheet, MOODS[draft.mood].color);
        }
        slot.innerHTML = '';
      });
      slot.querySelector('#btn-discard-draft').addEventListener('click', async () => {
        try { await storage.delete(draftKey, false); } catch (e) { /* ignore */ }
        slot.innerHTML = '';
      });
    }

    (async () => {
      try {
        const res = await storage.get(draftKey, false);
        if (!res || !res.value) return;
        const draft = JSON.parse(res.value);
        const sameAsCurrent = (draft.title || '') === (existing ? existing.title : '') &&
          (draft.content || '') === (existing ? existing.content : '');
        if (sameAsCurrent || (!draft.title && !draft.content)) return;
        showDraftBanner(draft);
      } catch (e) { /* no draft yet, ignore */ }
    })();

    let draftSaveTimer = null;
    function scheduleDraftSave() {
      clearTimeout(draftSaveTimer);
      draftSaveTimer = setTimeout(async () => {
        const draft = {
          title: titleInput.value.trim(),
          content: bodyInput.value.trim(),
          tags: tagsInput.value.split(',').map(t => t.trim()).filter(Boolean),
          mood: moodSelect.value,
          savedAt: new Date().toISOString()
        };
        if (!draft.title && !draft.content) return;
        try { await storage.set(draftKey, JSON.stringify(draft), false); } catch (e) { /* silent */ }
      }, 900);
    }
    titleInput.addEventListener('input', scheduleDraftSave);
    bodyInput.addEventListener('input', scheduleDraftSave);
    tagsInput.addEventListener('input', scheduleDraftSave);

    moodSelect.addEventListener('change', () => {
      moodTouchedByUser = true;
      applySheetMood(sheet, MOODS[moodSelect.value].color);
    });
    tagsInput.addEventListener('blur', () => {
      if (moodTouchedByUser) return;
      const guessed = guessMood({ tags: tagsInput.value.split(',').map(t => t.trim()).filter(Boolean), title: titleInput.value, content: bodyInput.value });
      moodSelect.value = guessed;
      applySheetMood(sheet, MOODS[guessed].color);
    });

    aiMoodBtn.addEventListener('click', async () => {
      const content = bodyInput.value.trim();
      if (!content) {
        showError('Tulis isi puisinya dulu sebelum meminta AI memilih suasana.');
        return;
      }
      aiMoodBtn.disabled = true;
      aiMoodBtn.textContent = 'Membaca puisi...';
      try {
        const allowedKeys = Object.keys(MOODS);
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-6',
            max_tokens: 20,
            system: 'Kamu mengklasifikasikan suasana puisi Bahasa Indonesia. Balas HANYA dengan salah satu kata ini, tanpa tanda baca atau penjelasan: ' + allowedKeys.join(', ') + '.',
            messages: [{ role: 'user', content: 'Judul: ' + (titleInput.value || '(tanpa judul)') + '\n\nIsi puisi:\n' + content }]
          })
        });
        const data = await response.json();
        const text = (data.content || []).map(b => b.text || '').join('').trim().toLowerCase();
        const matched = allowedKeys.find(k => text.includes(k));
        if (matched) {
          moodSelect.value = matched;
          moodTouchedByUser = true;
          applySheetMood(sheet, MOODS[matched].color);
        } else {
          showError('AI tidak yakin dengan suasananya, coba pilih manual.');
        }
      } catch (e) {
        showError('Gagal menghubungi AI. Coba pilih suasana secara manual.');
      } finally {
        aiMoodBtn.disabled = false;
        aiMoodBtn.textContent = '✨ Biar AI Pilih';
      }
    });

    saveBtn.addEventListener('click', async () => {
      const title = titleInput.value.trim();
      const content = bodyInput.value.trim();
      if (!title && !content) {
        showError('Isi judul atau puisi dulu sebelum menyimpan.');
        return;
      }
      const tags = tagsInput.value.split(',').map(t => t.trim()).filter(Boolean);
      saveBtn.disabled = true;
      saveBtn.textContent = 'Menyimpan...';
      const record = {
        id: existing ? existing.id : (Date.now().toString(36) + Math.random().toString(36).slice(2, 8)),
        title: title || 'Tanpa Judul',
        content: content,
        tags: tags,
        mood: moodSelect.value,
        date: existing ? existing.date : new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };
      try {
        await fsSetPoem(record.id, record);
        try { await storage.delete(draftKey, false); } catch (e) { /* non-fatal */ }
        closeOverlay();
        await loadPoems();
      } catch (e) {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Simpan Puisi';
        console.error('Gagal menyimpan puisi:', e);
        showError('Gagal menyimpan puisi: ' + (e && e.message ? e.message : 'kesalahan tidak diketahui') + '. Draf kamu tetap tersimpan otomatis, coba klik Simpan lagi.');
      }
    });
  }

  btnTulis.addEventListener('click', () => openForm());
  btnExport.addEventListener('click', () => downloadBackup());
  btnPrint.addEventListener('click', () => {
    if (poems.length === 0) {
      showError('Belum ada puisi untuk dicetak.');
      return;
    }
    preparePrintView();
    setTimeout(() => window.print(), 80);
  });

  function updateOwnerUI() {
    btnTulis.style.display = editMode ? '' : 'none';
    btnOwnerLock.textContent = editMode ? '🔓 Mode Penulis Aktif' : '🔑 Masuk sebagai Penulis';
    btnOwnerLock.classList.toggle('active', editMode);
  }

  btnOwnerLock.addEventListener('click', async () => {
    if (editMode) {
      editMode = false;
      updateOwnerUI();
      return;
    }
    const pass = window.prompt('Masukkan kata sandi penulis untuk menulis, menyunting, atau menghapus puisi:');
    if (pass === null) return;
    try {
      const enteredHash = await hashPassphrase(pass);
      if (enteredHash === OWNER_PASSPHRASE_HASH) {
        editMode = true;
        updateOwnerUI();
      } else {
        showError('Kata sandi salah. Kamu tetap bisa membaca semua puisi.');
      }
    } catch (e) {
      showError('Browser ini tidak mendukung verifikasi kata sandi.');
    }
  });

  function updateClock() {
    const el = document.getElementById('live-clock');
    if (!el) return;
    const now = new Date();
    const dateStr = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    const timeStr = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    el.textContent = dateStr + ' · ' + timeStr;
  }

  updateOwnerUI();
  updateClock();
  setInterval(updateClock, 1000);
  initTheme();
  buildStarfield();
  if (usingFallbackStorage) {
    const fb = document.getElementById('fallback-notice');
    if (fb) {
      fb.innerHTML =
        '<div class="draft-banner">' +
          '<span>ℹ️ Preferensi tema & draf otomatis tidak tersimpan permanen di tampilan ini (cuma berlaku selama sesi ini). Tenang, puisi kamu tetap aman — sudah tersimpan permanen lewat Firebase.</span>' +
        '</div>';
    }
  }
  loadPoems();
})();
</script>
